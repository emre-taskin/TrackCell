<div class="page-header">
  <div>
    <h2>Parts Manager</h2>
    <div class="page-sub">View and add new part numbers</div>
  </div>
</div>

<div class="parts-layout">
  <div class="glass-panel parts-list-panel">
    <h3>Existing Parts</h3>
    @if (parts().length === 0) {
      <div class="empty-state">No parts found. Add one below.</div>
    } @else {
      <div class="table-container">
        <table class="parts-table">
          <thead>
            <tr>
              <th>Part Number</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            @for (part of parts(); track part.id) {
              <tr>
                <td class="part-number-col"><code>{{ part.partNumber }}</code></td>
                <td>{{ part.description || '—' }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>

  <div class="glass-panel form-panel">
    <h3>Add New Part</h3>
    <form (ngSubmit)="addPart()" class="part-form">
      <div class="form-group">
        <label>Part Number <span class="required">*</span></label>
        <input type="text" class="field-control" [(ngModel)]="newPartNumber" name="partNumber" placeholder="e.g. PRT-1002" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea class="field-control" [(ngModel)]="newPartDescription" name="description" placeholder="Optional description..." rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-accent" [disabled]="isSubmitting() || !newPartNumber.trim()">
        <span class="material-symbols-rounded">add_circle</span>
        <span>Create Part</span>
      </button>
    </form>
  </div>
</div>
